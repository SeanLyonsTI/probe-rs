name: CC23XX CC27XX Series
manufacturer:
  id: 0x17
  cc: 0x0
variants:
- name: CC2340R5
  cores:
  - name: main
    type: armv6m
    core_access_options: !Arm
      ap: !v1 0
  memory_map:
  - !Nvm
    range:
      start: 0x0
      end: 0x80000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20009000
    cores:
    - main
  - !Nvm
    range:
      start: 0x4e020000
      end: 0x4e020800
    cores:
    - main
    access:
      boot: false
      execute: false
  flash_algorithms:
  - cc23xx-flash
- name: CC2745R10Q1
  cores:
  - name: main
    type: armv8m
    core_access_options: !Arm
      ap: !v1 0
  memory_map:
  - !Nvm
    range:
      start: 0x0
      end: 0x100000
    cores:
    - main
    access:
      boot: true
  - !Ram
    range:
      start: 0x20000000
      end: 0x20024000
    cores:
    - main
  - !Nvm
    range:
      start: 0x4e020000
      end: 0x4e020800
    cores:
    - main
    access:
      boot: false
      execute: false
  - !Nvm
    range:
      start: 0x4e040000
      end: 0x4e040400
    cores:
    - main
    access:
      boot: false
      execute: false
  flash_algorithms:
  - cc27xx-flash

flash_algorithms:
# Flash algorithm taken from 2dec2a109925c3cad05cbdaf8ce10a76355adcd2 of https://github.com/seanmlyons22/cc23xx-flash
- name: cc23xx-flash
  description: Host-side flash programming via SACI commands for CC23xx devices
  default: true
  flash_loader_type: host_side
  instructions: 
  load_address: 0x20000020
  pc_init: 0x1
  pc_uninit: 0xb9
  pc_program_page: 0x149
  pc_erase_sector: 0xed
  pc_erase_all: 0x1c1
  data_section_offset: 0x20001e00
  rtt_location: 0x200019b8
  flash_properties:
    address_range:
      start: 0x0
      end: 0x4E020800
    page_size: 0x800
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x800
      address: 0x0
    - size: 0x800
      address: 0x4E020000
  cores:
  - main
# Flash algorithm for CC27xx devices (CC2745R10Q1)
# Uses host-side flash programming via SACI commands
- name: cc27xx-flash
  description: Host-side flash programming via SACI commands for CC27xx devices
  default: true
  flash_loader_type: host_side
  instructions: 
  load_address: 0x20000020
  pc_init: 0x1
  pc_uninit: 0x11f
  pc_program_page: 0x1bf
  pc_erase_sector: 0x15b
  pc_erase_all: 0x22d
  data_section_offset: 0x20001e00
  rtt_location: 0x2000120c
  flash_properties:
    address_range:
      start: 0x0
      end: 0x4E040400
    page_size: 0x800
    erased_byte_value: 0xff
    program_page_timeout: 1000
    erase_sector_timeout: 2000
    sectors:
    - size: 0x800
      address: 0x0
    - size: 0x800
      address: 0x4E020000
    - size: 0x400
      address: 0x4E040000
  cores:
  - main
